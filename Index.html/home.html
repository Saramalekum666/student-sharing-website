<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENDR Home</title>
    <link rel="stylesheet" href="css/home.css">
    <script src="js/home.js" defer></script>
</head>

<body>

    <img src="img/logo.png" alt="LENDR Logo" class="logo">

    <h1 class="title">Welcome to LENDR</h1>

    <div class="timer" id="returnTimer">Next item return in: 00:00:00</div>

    <div class="content">

        <div class="item-box">
            <img src="img/calcu-removebg-preview.png" alt="Calculator">
            <h3>Calculator</h3>
            <button class="borrow-btn" onclick="location.href='borrow-profile.html?item=calculator'">Tap to
                Borrow</button>
        </div>

        <div class="item-box">
            <img src="img/il_fullxfull.2850166762_iagd-removebg-preview.png" alt="Periodic Table">
            <h3>Periodic Table</h3>
            <button class="borrow-btn" onclick="location.href='borrow-profile.html?item=periodic'">Tap to
                Borrow</button>
        </div>

        <div class="item-box">
            <img src="img/1572188_SPR_JPG_Output-removebg-preview.png" alt="Scientific Calculator">
            <h3>Scientific Calculator</h3>
            <button class="borrow-btn" onclick="location.href='borrow-profile.html?item=scientific'">Tap to
                Borrow</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="categories.html" class="nav-btn">
            <img src="img/categories-removebg-preview.png">
            Categories
        </a>

        <a href="leaderboards.html" class="nav-btn">
            <img src="img/leaderboard-removebg-preview.png">
            Leaderboard
        </a>

        <a href="profile.html" class="nav-btn">
            <img src="img/profile-removebg-preview.png">
            Profile
        </a>

        <a href="upload.html" class="nav-btn">
            <img src="img/upload-removebg-preview.png">
            Upload
        </a>
    </div>


    <div id="borrow-popup" class="popup">
        <div class="popup-box">
            <h3 id="borrow-title">Requesting Item...</h3>
            <p id="borrow-description" style="font-size: 0.9em; color: #666;"></p>
            <p id="borrow-message">Please wait for confirmation.</p>
            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <img src="img/ACT Logo.png" class="image">

</body>

</html>
