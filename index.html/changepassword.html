<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENDR | Change Password</title>
    <link rel="stylesheet" href="css/signupregistered.css">
    <script src="js/signupregistered.js" defer></script>
</head>

<body>

    <div class="container" id="change-password-container">
        <h1>LENDR</h1>
        <h2>RESET PASSWORD</h2>

        <p style="font-size: 0.85em; margin-bottom: 15px; color: #555;">
            Enter the code sent to your email and your new password below.
        </p>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="New Password" id="new-password" required>
        <input type="password" placeholder="Confirm New Password" id="confirm-new-password" required>

        <div id="change-error" style="color: red; font-size: 0.8em; margin-bottom: 10px; display: none;">
            Passwords do not match. Please try again.
        </div>

        <button class="login-btn" onclick="handleChangePassword()">Update Password</button>

        <div class="link">
            <a href="signupregistered.html">Back to Login</a>
        </div>
    </div>

    <img src="img/ACT Logo.png" class="right-center">

</body>

</html>
