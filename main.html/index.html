<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENDR | Login & Sign Up</title>
    <link rel="stylesheet" href="css/signupregistered.css">
    <script src="js/signupregistered.js" defer></script>
</head>

<body>

    <div class="container" id="login-container">
        <h1>WELCOME TO LENDR!</h1>
        <h2>LOGIN</h2>

        <input type="text" placeholder="Username" id="login-username" required>
        <input type="password" placeholder="Password" id="login-password" required>

        <div id="login-error" style="color: red; font-size: 0.8em; margin-bottom: 10px; display: none;">
            Invalid username or password. Please try again.
        </div>

        <button class="login-btn" onclick="handleLogin()">Log In</button>

        <div class="link">
            <a href="#" onclick="showForgot()">Forgot Username or Password?</a><br>
            <a href="#" onclick="showSignUp()">Sign Up</a>
        </div>
    </div>

    <div id="verify" class="popup">
        <div class="popup-box">
            <h3>ID Verification</h3>
            <p>Please verify your account</p>
            <input type="email" placeholder="School Email">
            <input type="text" placeholder="Verification Code">
            <br><br>
            <a href="home.html" class="login-btn">Verify & Continue</a>
            <br><br>
            <a href="#" onclick="closePopup('verify')">Cancel</a>
        </div>
    </div>

    <div id="signup" class="popup">
    <div class="popup-box">
        <h3>Sign Up</h3>
        <input type="text" placeholder="Username" id="reg-username">
        <input type="text" placeholder="Full Name" id="reg-fullname">
        <input type="email" placeholder="Email" id="reg-email">
        <input type="number" placeholder="School ID Number" id="reg-id">
        <input type="file" placeholder="Upload ID / Profile Picture" id="reg-pic">
        <input type="password" placeholder="Password" id="reg-password">   
        <input type="password" placeholder="Confirm Password" id="reg-confirm">
        <br>
        <button class="signup-btn" onclick="handleSignUp()">Sign Up</button>
        <br>
        <a href="#" onclick="closePopup('signup')">Cancel</a>
    </div>
</div>

    <div id="forgot" class="popup">
        <div class="popup-box">
            <h3>Forgot Username / Password</h3>
            <input type="email" placeholder="Email">
            <br><br>
            <button onclick="alert('Password reset email sent!')">Send Reset Link</button>
            <br>
            <a href="#" onclick="closePopup('forgot')">Cancel</a>
        </div>
    </div>

    <img src="img/ACT Logo.png" class="right-center">

</body>

</html>
