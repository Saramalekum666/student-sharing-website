<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | LENDR</title>
    <link rel="stylesheet" href="css/categories.css">
    <script src="js/categories.js" defer></script>
</head>

<body>

    <h1>Categories</h1>
    <h2>Tap a category to see available items</h2>

    <div class="category-container">
        <div class="category-card" onclick="showItems('calculator')">
            <h3>Calculator</h3>
        </div>
        <div class="category-card" onclick="showItems('scientific')">
            <h3>Scientific Calculator</h3>
        </div>
        <div class="category-card" onclick="showItems('periodic')">
            <h3>Periodic Table</h3>
        </div>
    </div>

    <div class="items-container" id="items-container">

    </div>

    <a href="home.html" class="back-link">← Back to Home</a>

    <div id="borrow-popup" class="popup">
        <div class="popup-box">
            <h3 id="borrow-title">Requesting Item...</h3>
            <p id="borrow-message">Please wait for confirmation to meet.</p>
            <button onclick="closePopup()">Close</button>
        </div>
    </div>

    <img src="img/ACT Logo.png" class="right-bottom">

</body>

</html>
